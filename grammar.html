<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Ngữ Pháp - JPD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-gray-800 font-sans h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white shadow-sm z-10 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#5f8a8b] rounded-xl flex items-center justify-center text-white font-bold text-xl">
                J
            </div>
            <div>
                <h1 class="text-xl font-bold text-[#2c3e50]">JPD Learning</h1>
                <p class="text-xs text-[#7d746d]">Nền tảng học tiếng Nhật</p>
            </div>
        </div>
        <nav class="hidden md:flex items-center gap-6">
            <a href="index.html" class="text-gray-500 hover:text-[#5f8a8b] font-medium transition-colors flex items-center gap-2">
                <i class="fa-solid fa-house"></i> Trang chủ
            </a>
            <a href="vocabulary.html" class="text-gray-500 hover:text-[#5f8a8b] font-medium transition-colors flex items-center gap-2">
                <i class="fa-solid fa-language"></i> Từ vựng
            </a>
            <a href="grammar.html" class="text-[#5f8a8b] font-bold border-b-2 border-[#5f8a8b] pb-1 flex items-center gap-2">
                <i class="fa-solid fa-book-open"></i> Ngữ pháp
            </a>
            <a href="#" class="text-gray-500 hover:text-[#5f8a8b] font-medium transition-colors flex items-center gap-2">
                <i class="fa-solid fa-spell-check"></i> Kanji
            </a>
        </nav>
        <button class="md:hidden text-gray-600 hover:text-[#5f8a8b]">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <!-- Dashboard View -->
        <div id="view-dashboard" class="h-full overflow-y-auto custom-scrollbar p-4 md:p-8">
            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-[#2c3e50]">Học Ngữ Pháp</h2>
                    <p class="text-gray-500 mt-2">Chọn bài học để bắt đầu học cấu trúc ngữ pháp.</p>
                </div>
                
                <div id="dashboard-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards will be rendered here by JS -->
                </div>
            </div>
        </div>

        <!-- Lesson Detail View -->
        <div id="view-lesson-detail" class="hidden h-full flex flex-col bg-gray-50">
            <div class="bg-white border-b border-gray-200 px-4 md:px-8 py-4 flex items-center gap-4">
                <button onclick="goBackToDashboard()" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <h2 id="lesson-title" class="text-xl font-bold text-[#2c3e50]">Lesson Title</h2>
                    <p id="lesson-subtitle" class="text-sm text-gray-500">Lesson Subtitle</p>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <div id="grammar-points-container" class="flex flex-col gap-4">
                        <!-- Grammar point cards will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Grammar Point Detail View -->
        <div id="view-grammar-point" class="hidden h-full flex flex-col bg-white">
            <div class="border-b border-gray-200 px-4 md:px-8 py-4 flex flex-col gap-4 sticky top-0 bg-white z-10 shadow-sm">
                <div class="flex items-center gap-4">
                    <button onclick="goBackToLesson()" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <h2 id="gp-title" class="text-2xl font-bold text-[#2c3e50]">Structure</h2>
                        <p id="gp-subtitle" class="text-sm text-gray-500">Meaning</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 bg-gray-50">
                <div class="max-w-3xl mx-auto flex flex-col gap-6">
                    
                    <!-- Structure Box -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#e8e2db]">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-puzzle-piece"></i> Cấu trúc
                        </h3>
                        <div id="gp-structure-content" class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <!-- Structure injected here -->
                        </div>
                    </div>
                    
                    <!-- Meaning & Usage -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#e8e2db]">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-lightbulb"></i> Ý nghĩa & Cách dùng
                        </h3>
                        <div class="flex flex-col gap-4">
                            <div>
                                <h4 class="font-bold text-[#2c3e50] mb-1">Ý nghĩa:</h4>
                                <p id="gp-meaning" class="text-[#10b981] font-medium"></p>
                                <p id="gp-explanation" class="text-gray-600 mt-1 text-sm"></p>
                            </div>
                            <div class="h-px bg-gray-100"></div>
                            <div>
                                <h4 class="font-bold text-[#2c3e50] mb-1">Cách dùng:</h4>
                                <p id="gp-usage" class="text-gray-600 text-sm leading-relaxed"></p>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 mt-2 flex items-start gap-3">
                                <i class="fa-solid fa-triangle-exclamation text-amber-500 mt-0.5"></i>
                                <div>
                                    <h4 class="font-bold text-amber-800 text-sm mb-1">Lưu ý</h4>
                                    <p id="gp-note" class="text-amber-700 text-sm"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Examples -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#e8e2db]">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                                <i class="fa-solid fa-quote-left"></i> Ví dụ
                            </h3>
                            <div class="flex gap-2">
                                <button id="toggle-reading-btn" onclick="toggleReading()" class="px-3 py-1 bg-[#f4f1ee] hover:bg-[#e8e2db] text-[#8b7b6c] text-xs font-semibold rounded-full transition-colors flex items-center gap-1">
                                    <i class="fa-solid fa-eye"></i> Hiện Cách đọc
                                </button>
                                <button id="toggle-romaji-btn" onclick="toggleRomaji()" class="px-3 py-1 bg-[#f4f1ee] hover:bg-[#e8e2db] text-[#8b7b6c] text-xs font-semibold rounded-full transition-colors flex items-center gap-1">
                                    <i class="fa-solid fa-eye"></i> Hiện Romaji
                                </button>
                            </div>
                        </div>
                        <div id="gp-examples-container" class="flex flex-col gap-3">
                            <!-- Examples injected here -->
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </main>

    <script src="js/grammar.js"></script>
</body>
</html>

<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Học Ngữ Pháp - Kana Mastery</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="css/style.css" />
        <style>
            /* Add graph paper background pattern like in the image */
            .bg-graph {
                background-color: #f8fbff;
                background-image: 
                    linear-gradient(#e5e7eb 1px, transparent 1px),
                    linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
                background-size: 20px 20px;
            }
        </style>
    </head>
    <body class="antialiased bg-[#fdfbf7] text-[#5c544d]">
        <nav class="sticky top-0 z-50 bg-[#fdfbf7]/80 backdrop-blur-md border-b border-[#e8e2db] py-3">
            <div class="container mx-auto px-4 flex flex-wrap justify-between items-center gap-y-4">
                <h1 class="text-xl font-semibold text-[#8b7b6c] w-full text-center sm:w-auto sm:text-left hover:text-[#5f8a8b] transition-colors">
                    <a href="index.html">
                        Kana
                        <span class="font-light italic text-[#a39485]">Mastery</span>
                    </a>
                </h1>

                <div class="flex space-x-6 text-sm w-full justify-center sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                    <a href="index.html" class="hover:text-[#5f8a8b] whitespace-nowrap transition-colors">Bảng chữ cái</a>
                    <a href="vocabulary.html" class="hover:text-[#5f8a8b] whitespace-nowrap transition-colors">Từ vựng</a>
                    <a href="#" class="hover:text-[#5f8a8b] whitespace-nowrap font-semibold text-[#5f8a8b]">✦ Ngữ pháp</a>
                </div>
            </div>
        </nav>

        <main class="min-h-screen bg-graph">
            <div class="container mx-auto px-4 md:px-6 py-8 md:py-12">
                <!-- VIEW 1: Dashboard (List of Lessons) -->
                <div id="view-dashboard" class="max-w-4xl mx-auto">
                    <h2 class="text-3xl md:text-4xl font-bold mb-8 text-[#2c3e50] text-center">Ngữ pháp Minna no Nihongo</h2>
                    <div id="dashboard-container" class="grid gap-4">
                        <!-- Cards injected by JS -->
                    </div>
                </div>

                <!-- VIEW 2: Lesson Detail (List of Grammar Points) -->
                <div id="view-lesson-detail" class="hidden max-w-5xl mx-auto">
                    <button onclick="goBackToDashboard()" class="text-[#3b82f6] hover:text-[#2563eb] font-medium mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Danh sách bài học
                    </button>
                    
                    <div class="mb-10">
                        <h2 id="lesson-title" class="text-4xl font-black text-[#1a202c] mb-2 tracking-tight"></h2>
                        <p id="lesson-subtitle" class="text-lg text-gray-500 font-medium"></p>
                        <div class="h-1 w-full bg-[#fbbf24] mt-4 rounded"></div>
                    </div>
                    
                    <div id="grammar-points-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Points injected by JS -->
                    </div>
                </div>

                <!-- VIEW 3: Grammar Point Detail -->
                <div id="view-grammar-point" class="hidden max-w-5xl mx-auto">
                    <div class="flex items-center justify-between mb-8">
                        <button onclick="goBackToLesson()" class="text-[#3b82f6] hover:text-[#2563eb] font-medium flex items-center gap-2">
                            <i class="fa-solid fa-arrow-left"></i> Trở về bài học
                        </button>
                        <div class="flex gap-3">
                            <button class="px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-gray-50 shadow-sm">
                                <i class="fa-regular fa-bookmark"></i> Thêm vào ghi nhớ
                            </button>
                            <button class="px-4 py-2 bg-[#2563eb] text-white rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-[#1d4ed8] shadow-sm">
                                <i class="fa-solid fa-pen"></i> Làm bài tập
                            </button>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h2 id="gp-title" class="text-4xl font-black text-[#1a202c] mb-2"></h2>
                        <div class="flex flex-col">
                            <span id="gp-subtitle" class="text-gray-500 font-medium text-lg mb-2"></span>
                            <div class="h-1 w-24 bg-[#fbbf24] rounded"></div>
                        </div>
                    </div>

                    <!-- 4 Info Panels -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <!-- Cấu trúc -->
                        <div class="bg-white rounded-2xl p-6 border-2 border-gray-800 relative shadow-[4px_4px_0px_0px_rgba(31,41,55,1)]">
                            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-12 h-2.5 bg-[#dda0dd] rounded-full border border-gray-800"></div>
                            <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                                <i class="fa-solid fa-layer-group text-[#8b5cf6]"></i> Cấu trúc
                            </h3>
                            <div id="gp-structure-content"></div>
                        </div>
                        
                        <!-- Giải nghĩa -->
                        <div class="bg-gray-900 rounded-2xl p-6 border-2 border-gray-900 relative text-white shadow-[4px_4px_0px_0px_rgba(209,213,219,1)]">
                            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-12 h-2.5 bg-[#60a5fa] rounded-full border border-gray-900"></div>
                            <h3 class="text-sm font-bold text-gray-300 flex items-center gap-2 mb-4 uppercase tracking-wider">
                                <i class="fa-regular fa-comment-dots text-[#60a5fa]"></i> Giải nghĩa
                            </h3>
                            <div id="gp-meaning" class="text-2xl font-bold mb-2"></div>
                            <div id="gp-explanation" class="text-gray-300 text-sm"></div>
                        </div>

                        <!-- Phạm vi sử dụng -->
                        <div class="bg-white rounded-2xl p-6 border-2 border-gray-800 relative shadow-[4px_4px_0px_0px_rgba(31,41,55,1)]">
                            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-12 h-2.5 bg-[#6ee7b7] rounded-full border border-gray-800"></div>
                            <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                                <i class="fa-solid fa-wand-magic-sparkles text-[#10b981]"></i> Phạm vi sử dụng
                            </h3>
                            <div id="gp-usage" class="text-gray-700 text-sm"></div>
                        </div>

                        <!-- Lưu ý -->
                        <div class="bg-white rounded-2xl p-6 border-2 border-gray-800 relative shadow-[4px_4px_0px_0px_rgba(31,41,55,1)]">
                            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-12 h-2.5 bg-[#fcd34d] rounded-full border border-gray-800"></div>
                            <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                                <i class="fa-solid fa-circle-info text-[#f59e0b]"></i> Lưu ý
                            </h3>
                            <div id="gp-note" class="text-gray-700 text-sm"></div>
                        </div>
                    </div>

                    <!-- Ví dụ -->
                    <div>
                        <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                            <div class="w-1.5 h-6 bg-[#3b82f6] rounded-full"></div> VÍ DỤ
                        </h3>
                        <div id="gp-examples-container" class="flex flex-col gap-4">
                            <!-- Examples injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="js/grammar.js"></script>
    </body>
</html>
